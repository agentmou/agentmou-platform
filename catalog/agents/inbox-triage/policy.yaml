permissions:
  gmail:
    read: true
    write: true
    delete: false
  slack:
    read: false
    write: false
  drive:
    read: false
    write: false

rate_limits:
  gmail:
    reads_per_minute: 60
    writes_per_minute: 30
  api_calls_per_minute: 100

constraints:
  max_emails_per_run: 50
  min_confidence_threshold: 0.5
  require_human_review_for:
    - high_priority_deletion
    - spam_marking_above_0.9

audit:
  log_all_actions: true
  retain_logs_days: 30
