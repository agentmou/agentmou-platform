name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/agentmou
  REDIS_URL: redis://127.0.0.1:6379
  NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
  CORS_ORIGIN: http://localhost:3000
  JWT_SECRET: test-jwt-secret
  WEB_APP_BASE_URL: http://localhost:3000
  LOG_LEVEL: silent
  NODE_ENV: test
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  agents:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -r services/agents/requirements.txt

      - name: Validate agents service
        run: |
          python -m py_compile services/agents/main.py
          python -m unittest discover -s services/agents -p 'test_*.py'

  deploy-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [check, agents]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure SSH
        env:
          PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
          PROD_VPS_SSH_HOST: ${{ secrets.PROD_VPS_SSH_HOST }}
          PROD_VPS_SSH_USER: ${{ secrets.PROD_VPS_SSH_USER }}
        run: |
          test -n "$PROD_VPS_SSH_KEY"
          test -n "$PROD_VPS_SSH_HOST"
          test -n "$PROD_VPS_SSH_USER"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$PROD_VPS_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy production
        env:
          PROD_VPS_SSH_HOST: ${{ secrets.PROD_VPS_SSH_HOST }}
          PROD_VPS_SSH_USER: ${{ secrets.PROD_VPS_SSH_USER }}
          PROD_VPS_REPO_PATH: ${{ secrets.PROD_VPS_REPO_PATH }}
        run: |
          test -n "$PROD_VPS_REPO_PATH"
          ssh "$PROD_VPS_SSH_USER@$PROD_VPS_SSH_HOST" \
            "cd \"$PROD_VPS_REPO_PATH\" && bash infra/scripts/deploy-prod.sh"
