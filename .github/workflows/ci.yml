name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://agentmou:changeme@127.0.0.1:5432/agentmou
  REDIS_URL: redis://127.0.0.1:6379
  NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
  CORS_ORIGIN: http://localhost:3000
  JWT_SECRET: test-jwt-secret
  MARKETING_PUBLIC_BASE_URL: http://localhost:3000
  APP_PUBLIC_BASE_URL: http://localhost:3000
  API_PUBLIC_BASE_URL: http://localhost:3001
  LOG_LEVEL: silent
  NODE_ENV: test
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Install yamllint (for validate-content)
        run: python3 -m pip install yamllint

      - name: Validate content docs
        run: make validate-content

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (informational)
        run: |
          echo '## Dependency Audit' >> "$GITHUB_STEP_SUMMARY"
          if pnpm audit 2>&1 | tee /tmp/audit.txt; then
            echo '✅ No known vulnerabilities.' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '⚠️ Vulnerabilities found — review output below.' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -40 /tmp/audit.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  clinic-demo-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentmou
          POSTGRES_USER: agentmou
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentmou -d agentmou"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://agentmou:changeme@127.0.0.1:5432/agentmou
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: test-jwt-secret
      MARKETING_PUBLIC_BASE_URL: http://localhost:3000
      APP_PUBLIC_BASE_URL: http://localhost:3000
      API_PUBLIC_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      LOG_LEVEL: silent
      NODE_ENV: test
      TURBO_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate

      - name: Seed clinic demo data
        run: pnpm db:seed

      - name: Run clinic demo smoke validation
        run: pnpm test:clinic-demo-smoke

  agents:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -r services/agents/requirements.txt

      - name: Validate agents service
        run: |
          python -m py_compile services/agents/main.py
          python -m unittest discover -s services/agents -p 'test_*.py'

  e2e:
    # Playwright smoke suite — 4 UI-level tests against a production Next
    # build with every /api/v1/* call intercepted by an in-process mock
    # server. No DB or Redis service container needed. See
    # `apps/web/e2e/README.md` for the design.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_DISABLE_CANONICAL_REDIRECT: '1'
      NEXT_PUBLIC_API_URL: http://127.0.0.1:47321
      API_PUBLIC_BASE_URL: http://127.0.0.1:47321
      MARKETING_PUBLIC_BASE_URL: http://127.0.0.1:3100
      APP_PUBLIC_BASE_URL: http://127.0.0.1:3100
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @agentmou/web exec playwright install chromium --with-deps

      - name: Run Playwright smoke suite
        run: pnpm --filter @agentmou/web test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 14

  deploy-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [check, clinic-demo-validation, agents, e2e]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && vars.DEPLOY_PROD_ENABLED == 'true'
    steps:
      - name: Configure SSH
        env:
          PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
          PROD_VPS_SSH_HOST: ${{ secrets.PROD_VPS_SSH_HOST }}
          PROD_VPS_SSH_USER: ${{ secrets.PROD_VPS_SSH_USER }}
        run: |
          test -n "$PROD_VPS_SSH_KEY"
          test -n "$PROD_VPS_SSH_HOST"
          test -n "$PROD_VPS_SSH_USER"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$PROD_VPS_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy production
        env:
          PROD_VPS_SSH_HOST: ${{ secrets.PROD_VPS_SSH_HOST }}
          PROD_VPS_SSH_USER: ${{ secrets.PROD_VPS_SSH_USER }}
          PROD_VPS_REPO_PATH: ${{ secrets.PROD_VPS_REPO_PATH }}
        run: |
          test -n "$PROD_VPS_REPO_PATH"
          ssh "$PROD_VPS_SSH_USER@$PROD_VPS_SSH_HOST" \
            "cd \"$PROD_VPS_REPO_PATH\" && bash infra/scripts/deploy-prod.sh"
